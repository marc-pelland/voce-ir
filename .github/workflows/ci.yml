name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      # --all-targets covers benches, tests, and examples too — catches the
      # class of clippy regressions only visible from test code (S69).
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --release --workspace

  coverage:
    name: Coverage gate (cargo-llvm-cov, S69 part 3)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache key from `check` — instrumented builds differ from
          # plain ones and would otherwise poison the shared cache.
          key: coverage
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Run instrumented tests once; the same .profraw data drives both the
      # printable summary and the fail-under-lines gate so coverage numbers
      # are guaranteed consistent between the two.
      - name: Generate coverage data
        run: cargo llvm-cov --workspace --no-report
      - name: Print summary table
        run: cargo llvm-cov report
      - name: Export lcov for downstream tooling
        run: cargo llvm-cov report --lcov --output-path lcov.info
      # Soft floor: 60% lines. Starting point — ratchet up after a few weeks
      # of green runs. If coverage trends much higher, raise this to
      # `actual − 5` so the gate stays meaningful without being fragile.
      - name: Enforce minimum line coverage (60%)
        run: cargo llvm-cov report --fail-under-lines 60
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lcov-coverage
          path: lcov.info
          if-no-files-found: warn

  supply-chain:
    name: Dependency audit (cargo audit + cargo deny, S70 Day 2)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache key — cargo audit + cargo deny work off the
          # registry index, not built artifacts, so they don't share with
          # the main check job.
          key: supply-chain
      # cargo-audit fails the build on any unpatched RustSec advisory in
      # the workspace's lockfile. Run before deny so the more-actionable
      # output lands first.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - name: cargo audit
        run: cargo audit
      - name: cargo deny check advisories
        run: cargo deny check advisories
      - name: cargo deny check licenses
        run: cargo deny check licenses
      - name: cargo deny check bans
        run: cargo deny check bans
      - name: cargo deny check sources
        run: cargo deny check sources

  mcp-server:
    name: MCP server (vitest, S65 Day 5)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Integration tests shell out to `voce` for validate + compile in
      # finalize. Build the CLI from source and put it on PATH so the
      # finalize-gate test runs against real validator output.
      - name: Build voce CLI (release)
        run: cargo build --release -p voce-validator
      - name: Put voce on PATH
        run: echo "${{ github.workspace }}/target/release" >> $GITHUB_PATH
      - name: Install mcp-server deps
        working-directory: packages/mcp-server
        run: npm ci || npm install
      - name: Type check
        working-directory: packages/mcp-server
        run: npx tsc --noEmit
      - name: Vitest
        working-directory: packages/mcp-server
        run: npm test
      - name: Build dist
        working-directory: packages/mcp-server
        run: npm run build

  cli-chat:
    name: cli-chat (vitest, S66 Day 1)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # cli-chat depends on @voce-ir/mcp-server via a file: link, so the
      # mcp-server bundle must exist before npm install.
      - name: Build mcp-server (provides core sub-path exports)
        working-directory: packages/mcp-server
        run: |
          npm ci || npm install
          npm run build
      - name: Install cli-chat deps
        working-directory: packages/cli-chat
        run: npm install
      - name: Type check
        working-directory: packages/cli-chat
        run: npx tsc --noEmit
      - name: Vitest
        working-directory: packages/cli-chat
        run: npm test
      - name: Build dist
        working-directory: packages/cli-chat
        run: npm run build
      # S66 acceptance: cold start must stay under 500ms on dev hardware.
      # GitHub runners are roughly comparable; threshold doubled to 1000ms
      # so transient runner load doesn't flake the gate.
      - name: Cold start benchmark
        working-directory: packages/cli-chat
        run: node scripts/bench-startup.mjs --runs 5 --max-ms 1000

  frontend-verify:
    name: Site-hero verifiers (round-trip + pass-list drift)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build voce CLI (release)
        run: cargo build --release -p voce-validator
      - name: Put voce on PATH
        run: echo "${{ github.workspace }}/target/release" >> $GITHUB_PATH
      - name: Install site-hero deps
        working-directory: packages/site-hero
        run: npm ci || npm install
      - name: Pass-list drift check
        working-directory: packages/site-hero
        run: node verify-pass-list.mjs
      - name: Regenerate fixtures from current toolchain
        working-directory: packages/site-hero
        run: node build-fixtures.mjs
      - name: Round-trip verification (WASM ↔ cached)
        working-directory: packages/site-hero
        run: node verify-roundtrip.mjs
      - name: Fail on uncommitted fixture drift
        run: |
          if ! git diff --quiet packages/site-hero/fixtures/; then
            echo "::error::fixture regeneration produced changes — commit them"
            git diff packages/site-hero/fixtures/
            exit 1
          fi

  wasm-size:
    name: WASM bundle size gate (S71 Day 1)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-size
      - name: Install binaryen (provides wasm-opt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq binaryen
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      # build-and-check.sh runs wasm-pack + system wasm-opt + size check.
      # Fails if the bundle grew >5% over packages/playground-wasm/.size-baseline.
      - name: Build + size check
        working-directory: packages/playground-wasm
        run: ./scripts/build-and-check.sh

  sbom:
    name: SBOM (CycloneDX, S70 Day 5)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: sbom
      # cargo-cyclonedx generates CycloneDX-format SBOMs covering every
      # workspace member's dependency graph. Run after the main `check`
      # job so we know the workspace builds cleanly first.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx
      - name: Generate SBOM (workspace)
        run: cargo cyclonedx --format json --override-filename voce-sbom
      # Each crate emits its own *.cdx.json under its directory; collect
      # them so reviewers can audit per-crate or workspace-wide.
      - name: Collect SBOMs
        run: |
          mkdir -p sbom-out
          find . -name "voce-sbom.cdx.json" -not -path "./target/*" -exec sh -c '
            for f; do
              dir=$(dirname "$f" | sed "s|^\./||")
              cp "$f" "sbom-out/${dir//\//_}.cdx.json"
            done
          ' sh {} +
          ls -la sbom-out/
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-out/
          if-no-files-found: error

  release:
    name: Build Release Binaries
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: voce-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: voce-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: voce-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: voce-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p voce-validator
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/voce dist/voce
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist voce
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  publish-release:
    name: Create GitHub Release
    needs: [release, sbom]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      # Tarball the SBOM artifacts together so the release surface stays
      # tidy — one *.tar.gz per binary plus one sbom-cyclonedx.tar.gz.
      - name: Bundle SBOM artifacts
        run: |
          if [ -d sbom-out ] || ls *.cdx.json >/dev/null 2>&1; then
            mkdir -p sbom-bundle
            mv *.cdx.json sbom-bundle/ 2>/dev/null || true
            [ -d sbom-out ] && cp -R sbom-out/* sbom-bundle/ || true
            tar -czf sbom-cyclonedx.tar.gz -C sbom-bundle .
          fi
          ls -la *.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
