name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --release --workspace

  frontend-verify:
    name: Site-hero verifiers (round-trip + pass-list drift)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build voce CLI (release)
        run: cargo build --release -p voce-validator
      - name: Put voce on PATH
        run: echo "${{ github.workspace }}/target/release" >> $GITHUB_PATH
      - name: Install site-hero deps
        working-directory: packages/site-hero
        run: npm ci || npm install
      - name: Pass-list drift check
        working-directory: packages/site-hero
        run: node verify-pass-list.mjs
      - name: Regenerate fixtures from current toolchain
        working-directory: packages/site-hero
        run: node build-fixtures.mjs
      - name: Round-trip verification (WASM ↔ cached)
        working-directory: packages/site-hero
        run: node verify-roundtrip.mjs
      - name: Fail on uncommitted fixture drift
        run: |
          if ! git diff --quiet packages/site-hero/fixtures/; then
            echo "::error::fixture regeneration produced changes — commit them"
            git diff packages/site-hero/fixtures/
            exit 1
          fi

  release:
    name: Build Release Binaries
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: voce-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: voce-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: voce-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: voce-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p voce-validator
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/voce dist/voce
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist voce
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  publish-release:
    name: Create GitHub Release
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
