# Per-fixture compile-time perf budgets (S71 Day 3).
#
# Each entry caps a fixture's compile-time work. The test harness
# (packages/validator/tests/perf_budgets_test.rs) compiles each fixture
# 10 times in a tight loop and takes the minimum wall time, then
# compares against `max_compile_us`. Output size is exact-deterministic
# and compared against `max_output_bytes`.
#
# Numbers are sized to absorb CI variance + debug-build overhead while
# still catching real regressions:
#   - max_compile_us  ~5–10× the local release minimum on a developer
#                     laptop. CI runners are typically 2–3× slower;
#                     debug-build adds another factor; the headroom
#                     accommodates both without flaking.
#   - max_output_bytes  ~1.1× the current measured size, rounded up.
#                       Output is byte-deterministic — the only growth
#                       reason is intentional compiler change.
#
# Updating a budget is fine; do it in a chore commit so reviewers see
# the delta and can audit whether the regression / improvement was
# intended. See docs/perf-investigation.md for context.

[fixture.container-grid]
path = "tests/fixtures/container-grid.voce.json"
max_compile_us = 800
max_output_bytes = 4800

[fixture.container-row]
path = "tests/fixtures/container-row.voce.json"
max_compile_us = 800
max_output_bytes = 4750

