[book]
title = "Voce IR Documentation"
authors = ["Marc Pelland"]
description = "AI-native intermediate representation for user interfaces"
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "coal"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/marcpelland/voce-ir"
additional-css = ["theme/voce.css"]
no-section-label = false

[output.html.search]
enable = true
limit-results = 20

[output.html.fold]
enable = true
level = 1
