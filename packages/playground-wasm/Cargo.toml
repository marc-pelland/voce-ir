[package]
name = "voce-playground-wasm"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Voce IR WASM bindings for the web playground"
keywords = ["ui", "ir", "compiler", "ai", "accessibility"]
categories = ["compilers", "web-programming", "development-tools"]
readme = "../../README.md"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
voce-validator = { path = "../validator", version = "0.1.0" }
voce-compiler-dom = { path = "../compiler-dom", version = "0.1.0", default-features = false }
voce-compiler-email = { path = "../compiler-email", version = "0.1.0" }
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Release profile lives at the workspace root — Cargo silently ignores
# profile config in non-root Cargo.toml files (S71 Day 1).

# wasm-pack ships a pinned wasm-opt that doesn't accept the WebAssembly
# features rustc 1.94+ emits. Disable the bundled run; CI + the build
# script call the system binaryen `wasm-opt -Oz --converge` afterwards.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
