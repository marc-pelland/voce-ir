[package]
name = "voce-playground-wasm"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Voce IR WASM bindings for the web playground"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
voce-validator = { path = "../validator" }
voce-compiler-dom = { path = "../compiler-dom", default-features = false }
voce-compiler-email = { path = "../compiler-email" }
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
